<style>
  :root {
    --teal-dark: #0b3d35;
    --teal-mid: #0f5444;
    --teal-bright: #1aab7a;
    --cyan: #2de8c8;
    --cyan-dim: #1db99f;
    --white: #f0faf7;
    --muted: #7ec9b4;
    --card-bg: rgba(255, 255, 255, 0.05);
    --card-border: rgba(45, 232, 200, 0.18);
  }

  @keyframes pulse-ring {
    0% {
      transform: scale(1);
      opacity: .6
    }

    70% {
      transform: scale(1.5);
      opacity: 0
    }

    100% {
      transform: scale(1.5);
      opacity: 0
    }
  }

  @keyframes flow-dash {
    to {
      stroke-dashoffset: -30;
    }
  }

  @keyframes fadeSlideIn {
    from {
      opacity: 0;
      transform: translateY(12px)
    }

    to {
      opacity: 1;
      transform: translateY(0)
    }
  }

  @keyframes scanLine {
    0% {
      top: 0
    }

    100% {
      top: 100%
    }
  }

  @keyframes barFill {
    from {
      width: 0
    }

    to {
      width: var(--tw)
    }
  }

  @keyframes spinSlow {
    from {
      transform: rotate(0deg)
    }

    to {
      transform: rotate(360deg)
    }
  }

  @keyframes glow-pulse {

    0%,
    100% {
      box-shadow: 0 0 0 0 rgba(45, 232, 200, 0)
    }

    50% {
      box-shadow: 0 0 18px 4px rgba(45, 232, 200, 0.22)
    }
  }

  @keyframes countUp {
    from {
      opacity: 0
    }

    to {
      opacity: 1
    }
  }

  @keyframes typewriter {
    from {
      width: 0
    }

    to {
      width: 100%
    }
  }

  @keyframes blink {

    0%,
    100% {
      opacity: 1
    }

    50% {
      opacity: 0
    }
  }

  @media (prefers-reduced-motion: no-preference) {
    .flow-line {
      stroke-dasharray: 10 6;
      animation: flow-dash 1.2s linear infinite;
    }
  }

  .step-card {
    animation: fadeSlideIn .45s ease both;
  }

  .scan-bar {
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    animation: scanLine 1.6s linear infinite;
    opacity: .7;
  }

  .bar-fill {
    animation: barFill .8s cubic-bezier(.4, 0, .2, 1) both;
  }

  html,
  body {
    margin: 0;
    background: transparent;
    overflow-x: hidden;
  }

  @media (max-width: 640px) {
    div[style*="min-height:480px"] {
      min-height: auto !important;
      border-radius: 12px !important;
    }

    div[style*="padding:14px 20px"] {
      padding: 12px 14px !important;
    }

    div[style*="padding:18px 20px 10px"] {
      min-height: auto !important;
      padding: 14px 12px 10px !important;
    }

    div[style*="padding:10px 20px 16px"] {
      padding: 10px 12px 14px !important;
      flex-wrap: wrap !important;
    }

    #btn-play {
      order: -1 !important;
      flex: 0 0 100% !important;
    }

    #btn-prev,
    #btn-next {
      flex: 1 1 0 !important;
      padding: 8px 10px !important;
    }

    div[style*="grid-template-columns:1fr 1fr"],
    div[style*="grid-template-columns:1fr 1fr 1fr"],
    div[style*="grid-template-columns:repeat(4,1fr)"] {
      grid-template-columns: 1fr !important;
    }

    div[style*="display:flex;align-items:center;gap:6px;flex-wrap:wrap"] {
      justify-content: center !important;
    }

  }

  @media (max-width: 380px) {
    div[style*="padding:14px 20px"] {
      gap: 8px !important;
    }

    #step-badge {
      padding: 3px 8px !important;
      font-size: 10px !important;
    }

    div[style*="font-size:14px;font-weight:600;color:var(--white)"] {
      font-size: 12px !important;
    }

    div[style*="font-size:11px;color:var(--muted);margin-top:2px;max-width:460px"] {
      font-size: 10px !important;
    }

  }
</style>

<div
  style="background:linear-gradient(160deg,#0b3d35 0%,#0d4a3e 50%,#0a3530 100%);border-radius:16px;padding:0;overflow:hidden;font-family:'Segoe UI',sans-serif;color:var(--white);min-height:480px;position:relative;border:1px solid rgba(45,232,200,0.15)">

  <!-- Header bar -->
  <div
    style="display:flex;align-items:center;gap:10px;padding:14px 20px;background:rgba(0,0,0,0.25);border-bottom:1px solid rgba(45,232,200,0.12)">
    <div
      style="width:32px;height:32px;border-radius:50%;border:2px solid var(--cyan);display:flex;align-items:center;justify-content:center;font-size:15px">
      ⊙</div>
    <div>
      <div style="font-size:14px;font-weight:600;color:var(--white)">HealthVision AI</div>
      <div style="font-size:11px;color:var(--muted)">Workflow Animation</div>
    </div>
    <div id="step-badge"
      style="margin-left:auto;background:rgba(45,232,200,0.12);border:1px solid var(--card-border);border-radius:20px;padding:3px 12px;font-size:11px;color:var(--cyan)">
      Step 1 of 6</div>
  </div>

  <!-- Progress dots -->
  <div style="display:flex;gap:6px;justify-content:center;padding:10px 0 0">
    <div id="dot-0" style="width:8px;height:8px;border-radius:50%;background:var(--cyan);transition:all .3s"></div>
    <div id="dot-1" style="width:8px;height:8px;border-radius:50%;background:rgba(45,232,200,0.25);transition:all .3s">
    </div>
    <div id="dot-2" style="width:8px;height:8px;border-radius:50%;background:rgba(45,232,200,0.25);transition:all .3s">
    </div>
    <div id="dot-3" style="width:8px;height:8px;border-radius:50%;background:rgba(45,232,200,0.25);transition:all .3s">
    </div>
    <div id="dot-4" style="width:8px;height:8px;border-radius:50%;background:rgba(45,232,200,0.25);transition:all .3s">
    </div>
    <div id="dot-5" style="width:8px;height:8px;border-radius:50%;background:rgba(45,232,200,0.25);transition:all .3s">
    </div>
  </div>

  <!-- Stage display -->
  <div id="stage" style="padding:18px 20px 10px;min-height:310px"></div>

  <!-- Controls -->
  <div
    style="display:flex;align-items:center;gap:10px;padding:10px 20px 16px;border-top:1px solid rgba(45,232,200,0.1)">
    <button onclick="prevStep()" id="btn-prev"
      style="background:rgba(45,232,200,0.08);border:1px solid var(--card-border);color:var(--cyan);border-radius:8px;padding:7px 18px;cursor:pointer;font-size:12px;transition:.2s"
      onmouseover="this.style.background='rgba(45,232,200,0.18)'"
      onmouseout="this.style.background='rgba(45,232,200,0.08)'">← Prev</button>
    <button onclick="togglePlay()" id="btn-play"
      style="background:var(--cyan);border:none;color:#0b3d35;border-radius:8px;padding:7px 20px;cursor:pointer;font-size:12px;font-weight:700;flex:1;transition:.2s">⏸
      Pause</button>
    <button onclick="nextStep()" id="btn-next"
      style="background:rgba(45,232,200,0.08);border:1px solid var(--card-border);color:var(--cyan);border-radius:8px;padding:7px 18px;cursor:pointer;font-size:12px;transition:.2s"
      onmouseover="this.style.background='rgba(45,232,200,0.18)'"
      onmouseout="this.style.background='rgba(45,232,200,0.08)'">Next →</button>
  </div>
</div>

<script>
  const steps = [
    {
      id: 0,
      title: "Step 1 — Capture or Upload",
      icon: "📷",
      desc: "User provides an image via real-time camera (WebRTC) or file upload. An ROI guide overlay helps frame the target area correctly on screen.",
      render: () => `
      <div class="step-card" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px">
        <div style="background:rgba(45,232,200,0.07);border:1px solid var(--card-border);border-radius:12px;padding:16px;text-align:center;position:relative;overflow:hidden">
          <div style="font-size:11px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.08em">📷 Camera (WebRTC)</div>
          <div style="width:80px;height:80px;margin:0 auto;border:2px solid var(--cyan);border-radius:8px;position:relative;background:#071f1a">
            <div class="scan-bar"></div>
            <div style="position:absolute;inset:8px;border:1px dashed rgba(45,232,200,0.4);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:22px">👁️</div>
            <div style="position:absolute;top:-1px;left:8px;width:14px;height:3px;background:var(--cyan)"></div>
            <div style="position:absolute;top:8px;left:-1px;width:3px;height:14px;background:var(--cyan)"></div>
            <div style="position:absolute;bottom:-1px;right:8px;width:14px;height:3px;background:var(--cyan)"></div>
            <div style="position:absolute;bottom:8px;right:-1px;width:3px;height:14px;background:var(--cyan)"></div>
          </div>
          <div style="font-size:10px;color:var(--muted);margin-top:8px">ROI Guide Active</div>
        </div>
        <div style="background:rgba(45,232,200,0.07);border:1px solid var(--card-border);border-radius:12px;padding:16px;text-align:center">
          <div style="font-size:11px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.08em">📁 File Upload</div>
          <div style="width:80px;height:80px;margin:0 auto;border:2px dashed rgba(45,232,200,0.4);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:#071f1a">
            <div style="font-size:22px">🖼️</div>
            <div style="font-size:9px;color:var(--muted)">.jpg/.png</div>
          </div>
          <div style="font-size:10px;color:var(--muted);margin-top:8px">Size-limited, downscaled</div>
        </div>
      </div>
      <div style="margin-top:12px;background:rgba(45,232,200,0.05);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--muted);border-left:2px solid var(--cyan)">
        Supports desktop & mobile browsers. Large images are auto-downscaled for stability.
      </div>`
    },
    {
      id: 1,
      title: "Step 2 — Region Detection",
      icon: "👁️",
      desc: "OpenCV Haar Cascade algorithms locate the target region of interest — eye sclera, face, or nail — with intelligent dual-strategy fallback and 35% padding.",
      render: () => `
      <div class="step-card" style="margin-top:8px">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">
          ${[["👁️", "Eye Sclera", "Haar Cascade\nFace-first"], ["🧑", "Face", "Direct scan\nfallback"], ["💅", "Nail", "Adaptive\nROI crop"]].map(([ic, lb, sub]) => `
          <div style="background:rgba(45,232,200,0.07);border:1px solid var(--card-border);border-radius:10px;padding:12px;text-align:center">
            <div style="font-size:24px;margin-bottom:6px">${ic}</div>
            <div style="font-size:12px;font-weight:600;color:var(--white)">${lb}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:4px;white-space:pre-line">${sub}</div>
          </div>`).join('')}
        </div>
        <div style="background:#071f1a;border:1px solid var(--card-border);border-radius:10px;padding:14px">
          <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Detection pipeline</div>
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            ${["Input Image", "Face Detect", "Eye Locate", "35% Padding", "Crop ROI"].map((s, i) => `
              <div style="background:rgba(45,232,200,0.1);border:1px solid var(--card-border);border-radius:6px;padding:4px 10px;font-size:10px;color:var(--cyan)">${s}</div>
              ${i < 4 ? '<div style="color:var(--cyan);font-size:12px">→</div>' : ''}`).join('')}
          </div>
        </div>
      </div>`
    },
    {
      id: 2,
      title: "Step 3 — Module Selection",
      icon: "🔀",
      desc: "The system routes the detected region to the correct detection module — Eye/Jaundice, Face/Skin Disease, or Nail Disorder — based on user selection.",
      render: () => `
      <div class="step-card" style="margin-top:8px">
        <div style="text-align:center;margin-bottom:14px">
          <div style="display:inline-block;background:rgba(45,232,200,0.1);border:1.5px solid var(--cyan);border-radius:10px;padding:8px 22px;font-size:12px;color:var(--cyan)">Detected Region (224×224 px)</div>
          <div style="font-size:18px;margin:8px 0;color:var(--cyan)">↓</div>
          <div style="font-size:11px;color:var(--muted)">Smart router selects model</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
          ${[
          ["👁️", "Eye Module", "Jaundice detection\n(Sclera scan)", "#1a6e5a"],
          ["🧑", "Face Module", "Skin disease\n(5 categories)", "#1a5a6e"],
          ["💅", "Nail Module", "Nail disorders\n(3 categories)", "#5a1a6e"]
        ].map(([ic, lb, sub, col]) => `
          <div style="background:${col}22;border:1.5px solid ${col}88;border-radius:12px;padding:14px;text-align:center;animation:glow-pulse 3s ease infinite">
            <div style="font-size:26px;margin-bottom:6px">${ic}</div>
            <div style="font-size:12px;font-weight:700;color:var(--white)">${lb}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:5px;white-space:pre-line">${sub}</div>
          </div>`).join('')}
        </div>
      </div>`
    },
    {
      id: 3,
      title: "Step 4 — AI Analysis",
      icon: "🧠",
      desc: "The cropped region is preprocessed (RGB, 224×224, normalized to [0,1]) and fed into MobileNetV2 or EfficientNetB0 for inference via TensorFlow/Keras.",
      render: () => `
      <div class="step-card" style="margin-top:8px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
          <div style="background:rgba(45,232,200,0.07);border:1px solid var(--card-border);border-radius:12px;padding:14px">
            <div style="font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.07em">📱 MobileNetV2</div>
            <div style="font-size:10px;color:var(--white)">Eye · Nail models</div>
            <div style="font-size:10px;color:var(--muted);margin-top:4px">Sigmoid (binary) · Softmax (3-class)</div>
            <div style="margin-top:10px">
              ${["ImageNet Weights", "Fine-tuned layers", "Transfer learning"].map(l => `<div style="font-size:9px;color:var(--muted);padding:2px 0">✓ ${l}</div>`).join('')}
            </div>
          </div>
          <div style="background:rgba(45,232,200,0.07);border:1px solid var(--card-border);border-radius:12px;padding:14px">
            <div style="font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.07em">🔬 EfficientNetB0</div>
            <div style="font-size:10px;color:var(--white)">Face/Skin model</div>
            <div style="font-size:10px;color:var(--muted);margin-top:4px">Softmax (5-class output)</div>
            <div style="margin-top:10px">
              ${["Compound scaling", "EfficientNet-B0", "5 skin classes"].map(l => `<div style="font-size:9px;color:var(--muted);padding:2px 0">✓ ${l}</div>`).join('')}
            </div>
          </div>
        </div>
        <div style="background:#071f1a;border:1px solid var(--card-border);border-radius:10px;padding:12px">
          <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Preprocessing pipeline</div>
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            ${["Decode JPEG", "→ RGB", "Resize 224²", "Normalize [0,1]", "Model Input"].map((s, i) => `
              <div style="background:rgba(45,232,200,0.08);border:1px solid var(--card-border);border-radius:5px;padding:3px 9px;font-size:10px;color:var(--cyan)">${s}</div>`).join('')}
          </div>
        </div>
      </div>`
    },
    {
      id: 4,
      title: "Step 5 — Prediction Output",
      icon: "📊",
      desc: "Results appear in under 2 seconds: the predicted label, confidence score, top-K class rankings, and a preview of the detected region are returned as JSON.",
      render: () => `
      <div class="step-card" style="margin-top:8px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Confidence scores (sample)</div>
            ${[["Jaundice Detected", "92%", "0.92"], ["Normal Sclera", "6%", "0.06"], ["Uncertain", "2%", "0.02"]].map(([lb, pct, val], i) => `
            <div style="margin-bottom:8px">
              <div style="display:flex;justify-content:space-between;margin-bottom:3px;font-size:10px">
                <span style="color:${i === 0 ? 'var(--cyan)' : 'var(--muted)'}">${lb}</span>
                <span style="color:${i === 0 ? 'var(--cyan)' : 'var(--muted)'}">${pct}</span>
              </div>
              <div style="background:rgba(255,255,255,0.07);border-radius:4px;height:6px;overflow:hidden">
                <div class="bar-fill" style="height:100%;border-radius:4px;background:${i === 0 ? 'var(--cyan)' : 'rgba(45,232,200,0.3)'};--tw:${pct}"></div>
              </div>
            </div>`).join('')}
          </div>
          <div style="background:#071f1a;border:1px solid var(--card-border);border-radius:10px;padding:12px">
            <div style="font-size:11px;color:var(--muted);margin-bottom:8px">JSON response</div>
            <pre style="font-size:9px;color:var(--cyan);margin:0;line-height:1.6;white-space:pre-wrap">{
  "label": "Jaundice",
  "confidence": 0.92,
  "top_k": [
    ["Jaundice", 0.92],
    ["Normal", 0.06]
  ],
  "time_ms": 1840,
  "crop": "base64..."
}</pre>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
          ${[["95%+", "Accuracy"], ["<2s", "Speed"], ["224²", "Resolution"], ["Top-K", "Rankings"]].map(([v, l]) => `
          <div style="background:rgba(45,232,200,0.07);border:1px solid var(--card-border);border-radius:8px;padding:10px;text-align:center">
            <div style="font-size:16px;font-weight:700;color:var(--cyan)">${v}</div>
            <div style="font-size:9px;color:var(--muted);margin-top:2px">${l}</div>
          </div>`).join('')}
        </div>
      </div>`
    },
    {
      id: 5,
      title: "Step 6 — AI Health Assistant",
      icon: "🤖",
      desc: "An AI assistant uses the scan result as context to generate a summary, dietary advice, urgent-sign guidance, hospital finder, and printable appointment receipts.",
      render: () => `
      <div class="step-card" style="margin-top:8px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
          ${[
          ["📋", "Scan Summary", "Contextual analysis\nof your result"],
          ["🥗", "Diet Advice", "Recommended foods\n& supplements"],
          ["⚠️", "Urgent Signs", "When to seek\nimmediate care"],
          ["🏥", "Hospital Finder", "Search by state\n& district"],
        ].map(([ic, lb, sub]) => `
          <div style="background:rgba(45,232,200,0.06);border:1px solid var(--card-border);border-radius:10px;padding:12px;display:flex;gap:10px;align-items:flex-start">
            <div style="font-size:20px;flex-shrink:0">${ic}</div>
            <div>
              <div style="font-size:12px;font-weight:600;color:var(--white)">${lb}</div>
              <div style="font-size:10px;color:var(--muted);margin-top:3px;white-space:pre-line">${sub}</div>
            </div>
          </div>`).join('')}
        </div>
        <div style="background:rgba(45,232,200,0.07);border:1.5px solid rgba(45,232,200,0.3);border-radius:10px;padding:12px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <div style="width:8px;height:8px;border-radius:50%;background:var(--cyan);animation:pulse-ring 1.5s ease-out infinite"></div>
            <div style="font-size:11px;font-weight:600;color:var(--cyan)">AI Assistant active</div>
          </div>
          <div style="font-size:10px;color:var(--muted);line-height:1.6">
            Based on your scan, jaundice indicators are elevated. Suggested actions include a bilirubin blood test, liver function panel, and consultation with a hepatologist.
          </div>
          <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
            ${["Find Hospital", "Book Appointment", "Print Receipt"].map(l => `
            <div style="background:rgba(45,232,200,0.1);border:1px solid var(--card-border);border-radius:5px;padding:3px 10px;font-size:9px;color:var(--cyan)">→ ${l}</div>`).join('')}
          </div>
        </div>
      </div>`
    }
  ];

  let current = 0;
  let playing = true;
  let timer = null;

  function notifyHeight() {
    const height = Math.ceil(document.documentElement.scrollHeight);
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'healthvision-workflow-height', height }, '*');
    }
  }

  function render() {
    const s = steps[current];
    document.getElementById('step-badge').textContent = `Step ${current + 1} of 6`;
    for (let i = 0; i < 6; i++) {
      const d = document.getElementById('dot-' + i);
      d.style.background = i === current ? 'var(--cyan)' : i < current ? 'rgba(45,232,200,0.5)' : 'rgba(45,232,200,0.2)';
      d.style.width = i === current ? '18px' : '8px';
      d.style.borderRadius = '4px';
    }
    document.getElementById('stage').innerHTML = `
    <div style="margin-bottom:10px;display:flex;align-items:center;gap:10px">
      <div style="width:36px;height:36px;border-radius:50%;background:rgba(45,232,200,0.12);border:1.5px solid rgba(45,232,200,0.4);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${s.icon}</div>
      <div>
        <div style="font-size:14px;font-weight:600;color:var(--white)">${s.title}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;max-width:460px">${s.desc}</div>
      </div>
    </div>
    ${s.render()}
  `;
    requestAnimationFrame(notifyHeight);
  }

  function nextStep() { current = (current + 1) % 6; render(); resetTimer(); }
  function prevStep() { current = (current + 5) % 6; render(); resetTimer(); }

  function resetTimer() {
    clearInterval(timer);
    if (playing) timer = setInterval(nextStep, 3800);
  }

  function togglePlay() {
    playing = !playing;
    document.getElementById('btn-play').textContent = playing ? '⏸ Pause' : '▶ Play';
    resetTimer();
  }

  render();
  window.addEventListener('load', notifyHeight);
  window.addEventListener('resize', notifyHeight);
  timer = setInterval(nextStep, 3800);
</script>
